name: 纯GitHub文字转视频（最终100%成功版）
on:
  push:
    branches:
      - main
    paths:
      - my_text.txt
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装系统依赖（ffmpeg）
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install pillow requests --no-cache-dir

      - name: 执行视频生成脚本
        run: python .github/workflows/auto_video.py
        env:
          SCKEY: ${{ secrets.SCKEY }}

      - name: 上传视频到GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: output-video
          path: /tmp/output.mp4
          retention-days: 30
