name: 纯GitHub文字转视频（零moviepy版）
on:
  push:
    branches:
      - main
    paths:
      - my_text.txt
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装系统依赖（仅ffmpeg，无Python库依赖）
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 执行视频生成脚本
        run: python .github/workflows/auto_video.py
        env:
          SCKEY: ${{ secrets.SCKEY }}
